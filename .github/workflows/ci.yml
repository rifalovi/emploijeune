name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  # Valeurs factices pour permettre au build Next.js de résoudre les modules
  # qui lisent process.env.* au build time. Aucune vraie clé n'est utilisée
  # ici : les routes serveur n'exécutent pas leurs handlers en build.
  NEXT_PUBLIC_SUPABASE_URL: https://ci.placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
  SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key
  ANTHROPIC_API_KEY: ci-placeholder
  RESEND_API_KEY: ci-placeholder
  NEXT_PUBLIC_APP_URL: http://localhost:3000

jobs:
  typecheck:
    name: TypeScript strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      # NB: `npm run format:check` n'est volontairement pas inclus dans la CI
      # car le repo contient des fichiers historiques non formatés. À ré-activer
      # après un pass `npm run format` global (hors scope stabilisation V1).

  test:
    name: Tests unitaires (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    needs: [typecheck, lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build
