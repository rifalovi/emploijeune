<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>OIF Emploi Jeunes</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #0e4f88 0%, #1565a8 60%, #0198e9 100%);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
      }
      .container {
        max-width: 360px;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin: 1rem 0 0.5rem;
      }
      p {
        font-size: 0.9rem;
        opacity: 0.85;
        line-height: 1.5;
        margin: 0.5rem 0;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-top-color: #f5a623;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 1.5rem auto 0;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .badge {
        display: inline-block;
        padding: 0.25rem 0.75rem;
        background: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 999px;
        font-size: 0.7rem;
        backdrop-filter: blur(8px);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <span class="badge">Plateforme OIF · SCS</span>
      <h1>OIF Emploi Jeunes</h1>
      <p>Chargement de votre espace de travail…</p>
      <p style="font-size: 0.75rem; opacity: 0.6;">
        Connexion sécurisée à <strong style="font-family: monospace;">suivi-projet.org</strong>
      </p>
      <div class="spinner" aria-hidden="true"></div>
    </div>
  </body>
</html>
